name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest
      - run: uv build
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download source archive and calculate sha
        id: checksum
        run: |
          URL="https://github.com/AndyKong2020/gitcode-cli/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          curl -fsSL "$URL" -o source.tar.gz
          echo "sha256=$(sha256sum source.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Clone tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh repo clone AndyKong2020/homebrew-tap tap-repo
      - name: Update formula
        run: |
          cat > tap-repo/Formula/gitcode-cli.rb <<'EOF'
          class GitcodeCli < Formula
            include Language::Python::Virtualenv

            desc "GitHub CLI-style command line interface for GitCode"
            homepage "https://github.com/AndyKong2020/gitcode-cli"
            url "https://github.com/AndyKong2020/gitcode-cli/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
            sha256 "${{ steps.checksum.outputs.sha256 }}"
            license "MIT"

            depends_on "python@3.12"

            def install
              venv = virtualenv_create(libexec, "python3.12")
              venv.pip_install buildpath
              bin.install_symlink libexec/"bin/gc"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/gc version")
            end
          end
          EOF
      - name: Commit and push formula
        run: |
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gitcode-cli.rb
          git commit -m "Update gitcode-cli ${GITHUB_REF_NAME}" || exit 0
          git push
